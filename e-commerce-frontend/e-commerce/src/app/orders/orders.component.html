<h2 class="text-center mt-3">MY ORDERS</h2>

<div *ngIf="orders.length === 0" class="text-center mt-5">
  <h4>No orders yet 📦</h4>
</div>

<div *ngFor="let order of orders" class="card m-3 p-3 shadow">

  <div class="d-flex justify-content-between align-items-center">

    <div>
      <h5>Order ID: {{order.orderId}}</h5>
      <p>Status: 
        <span [ngClass]="{
          'text-success': order.orderStatus === 'PLACED',
          'text-danger': order.orderStatus === 'CANCELLED'
        }">
          {{order.orderStatus}}
        </span>
      </p>
    </div>

    <div>
      <h5>₹ {{order.orderAmt}}</h5>
    </div>

    <div>
        <button class="btn btn-info btn-sm me-2"
        (click)="viewDetails(order.orderId)">
            View Details
        </button>
      <button class="btn btn-danger btn-sm"
              *ngIf="order.orderStatus === 'PLACED'"
              (click)="cancel(order.orderId)">
        Cancel
      </button>
    </div>
    
  </div>

</div>
