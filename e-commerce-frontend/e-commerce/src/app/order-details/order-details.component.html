<h2 class="text-center mt-3">Order Details</h2>

<div *ngIf="products.length === 0" class="text-center mt-5">
  <h4>No products found</h4>
</div>
<div *ngIf="products.length > 0" class="card m-3 p-3 shadow">

  <h4>Order Summary</h4>

  <p><b>Order ID:</b> {{products[0].orderId}}</p>
  <p><b>Date:</b> {{products[0].orderDate}}</p>

  <p>
    <b>Status:</b> 
    <span 
      [ngClass]="{
        'text-success': products[0].orderStatus === 'PLACED',
        'text-danger': products[0].orderStatus === 'CANCELLED'
      }">
      {{products[0].orderStatus}}
    </span>
  </p>

  <h5 class="mt-2">
    Total: ₹ {{products[0].orderAmt}}
  </h5>

</div>
<div *ngFor="let item of products" class="card m-3 p-3 shadow">

  <div class="row align-items-center">

    <div class="col-md-3 text-center">
      <img 
        [src]="'assets/images/' + item.prodImage"
        class="img-fluid"
        style="height:120px; object-fit:contain;">
    </div>

    <div class="col-md-6">
      <h5>{{item.prodName}}</h5>
      <p>Price: ₹ {{item.price}}</p>
      <p>Quantity: {{item.qty}}</p>
    </div>

    <div class="col-md-3 text-end">
      <b>₹ {{item.price * item.qty}}</b>
    </div>

  </div>

</div>
