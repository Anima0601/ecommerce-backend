<h2 class="mt-3 text-center">CART</h2>

<!-- EMPTY CART -->
<div *ngIf="cartItems.length === 0" class="text-center mt-5">

  <img src="assets/images/empty-cart.png" width="200" class="mb-3">

  <h4>Your cart is empty 🛒</h4>
  <p class="text-muted">Looks like you haven't added anything yet</p>

  <a routerLink="/products" class="btn btn-info mt-2">
    Shop Now
  </a>

</div>

<!-- CART ITEMS -->
<div *ngIf="cartItems.length > 0">

  <div *ngFor="let item of cartItems" class="card p-3 m-3 shadow">

    <div class="row align-items-center">

      <!-- IMAGE -->
      <div class="col-md-2 text-center">
        <img [src]="'assets/images/' + item.prodImage"
             class="img-fluid"
             style="height:80px; object-fit:contain;">
      </div>

      <!-- DETAILS -->
      <div class="col-md-4">
        <h5>
          {{item.prodName}}

          <!-- OUT OF STOCK BADGE -->
          <span *ngIf="item.stock === 0" class="badge bg-danger ms-2">
            Out of Stock
          </span>
        </h5>

        <p>₹ {{item.price}}</p>
        <small class="text-muted">Stock: {{item.stock}}</small>
      </div>

      <!-- QUANTITY -->
      <div class="col-md-3 text-center">

        <button class="btn btn-outline-dark btn-sm"
                (click)="decrease(item)">
          -
        </button>

        <span class="mx-2">{{item.quantity}}</span>

        <button class="btn btn-outline-dark btn-sm"
                (click)="increase(item)"
                [disabled]="item.quantity >= item.stock || item.stock === 0">
          +
        </button>

      </div>

      <!-- TOTAL -->
      <div class="col-md-2 text-center">
        <b>₹ {{item.price * item.quantity}}</b>
      </div>

      <!-- REMOVE -->
      <div class="col-md-1 text-center">
        <button class="btn btn-danger btn-sm"
                (click)="remove(item.prodId)">
          X
        </button>
      </div>

    </div>

  </div>


  <h4 class="text-center me-4">Total Amount: ₹ {{total}}</h4>
  <div class="text-center mt-3">
    <button class="btn btn-info"
            (click)="placeOrder()"
            [disabled]="cartItems.length === 0">
      Place Order
    </button>
  </div>
</div>
